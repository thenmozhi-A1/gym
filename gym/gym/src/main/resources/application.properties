# DB credentials for Aiven MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-1634e0bf-thenmozhiayothi-2556.i.aivencloud.com:27975/defaultdb?sslMode=REQUIRED}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:tiger}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pooling - allow startup even if DB is temporarily unreachable
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=-1

# Allow app to start without immediate DB connection
spring.jpa.defer-datasource-initialization=true

# Server Port (Render uses PORT env var)
server.port=${PORT:8080}

# CORS (allow React frontend)
spring.web.cors.allowed-origins=${FRONTEND_URL:https://gym-ii9k.vercel.app,http://localhost:5173}

