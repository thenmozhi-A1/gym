# =============================================
# GymDash - MySQL Configuration
# =============================================

# Use environment variables for production, fallback to localhost for dev
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gymdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:tiger}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pooling Optimizations
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Server Port (Render uses PORT env var)
server.port=${PORT:8080}

# CORS (allow React frontend)
spring.web.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
