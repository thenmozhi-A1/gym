# =============================================
# GymDash - MySQL Configuration
# =============================================

# DB credentials for Aiven MySQL
spring.config.import=optional:classpath:secrets.properties
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gym?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:tiger}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Connection Pooling - allow startup even if DB is temporarily unreachable
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=-1

# Allow app to start without immediate DB connection
spring.jpa.defer-datasource-initialization=true

# Server Port (Render uses PORT env var)
server.port=${PORT:8080}

# CORS (allow React frontend)
spring.web.cors.allowed-origins=${FRONTEND_URL:https://gym-ii9k.vercel.app,http://localhost:5173,http://localhost:3000}

razorpay.key.id=${RAZORPAY_KEY_ID:test_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_key_secret}

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretLocalJwtKeyThatNeedsToBeLongEnoughForHS256Algorithm}
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-days=30

# WebAuthn Configuration
webauthn.rp.id=localhost
webauthn.rp.name=GymDash
webauthn.rp.origin=http://localhost:5173

# ── Email / Notification Settings ─────────────────────────────────────────
# Set gym.notifications.enabled=true and provide real SMTP credentials to activate
gym.notifications.enabled=${NOTIFICATIONS_ENABLED:false}
gym.notifications.expiry-days-ahead=${NOTIFICATIONS_EXPIRY_DAYS:7}
gym.notifications.from-email=${MAIL_FROM:noreply@byfitness.com}
gym.notifications.gym-name=B&Y Fitness Gym

# SMTP (Gmail example — swap host/port for any provider)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
# Disable auto-config failure when no SMTP credentials are provided
spring.autoconfigure.exclude=