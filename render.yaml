services:
  - type: web
    name: gym-backend
    runtime: docker
    dockerContext: gym/gym
    dockerfilePath: gym/gym/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://gym-ii9k.vercel.app
